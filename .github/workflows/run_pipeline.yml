name: Fintech AI Loan Underwriter Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  underwrite:
    name: Execute AI Underwriting and Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run AI Pipeline
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HUBSPOT_PIPELINE: ${{ secrets.HUBSPOT_PIPELINE }}
          HUBSPOT_STAGE_NEW: ${{ secrets.HUBSPOT_STAGE_NEW }}
          HUBSPOT_STAGE_Q: ${{ secrets.HUBSPOT_STAGE_Q }}
          HUBSPOT_STAGE_CON: ${{ secrets.HUBSPOT_STAGE_CON }}
        run: npm start
